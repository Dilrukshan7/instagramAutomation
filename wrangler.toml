name = "ig-auto-responder"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for dedupe, token storage, rules, and reply log.
# Create it with:  npx wrangler kv namespace create STATE
# then paste the returned id below.
[[kv_namespaces]]
binding = "STATE"
id = "a2440c336a39474f960d835ea31e2a0f"

# Relational data: automations, message steps, providers, logs, analytics.
[[d1_databases]]
binding = "DB"
database_name = "ig-auto-responder"
database_id = "bef88c7f-e2b3-4b34-8bc5-86a81ee48f26"

# Job scheduler: SQLite-backed Durable Object (free tier) that fires alarms to
# drain the D1 jobs table for delayed/sequenced message sends.
[[durable_objects.bindings]]
name = "SCHEDULER"
class_name = "Scheduler"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Scheduler"]

# Workers AI: used only for text embeddings (RAG retrieval). Free daily
# allowance; bge-m3 is multilingual. No API key needed — native binding.
[ai]
binding = "AI"

[vars]
# Your Instagram professional account's user ID (from the Meta app dashboard / /me endpoint)
IG_USER_ID = "17841456545805611"
# Graph API version to call
GRAPH_API_VERSION = "v23.0"

# Crons: weekly token refresh (Mondays 03:00 UTC) + every-minute job-queue
# backstop (the Durable Object alarm is primary; this catches lost alarms).
[triggers]
crons = ["0 3 * * 1", "* * * * *"]

